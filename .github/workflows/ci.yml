name: Release Contract

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Static checks
        run: |
          python -m ruff check .
          python -m ruff format --check .
          python -m mypy catalyst_finance/__init__.py catalyst_finance/api.py catalyst_finance/cli.py catalyst_finance/domain.py catalyst_finance/io.py catalyst_finance/serve.py catalyst_finance/version.py
      - name: Tests
        run: python -m pytest -q
      - name: Release validation
        run: python scripts/check_release.py
      - name: Build WordPress package
        run: python scripts/build_plugin.py
      - name: Verify clean source tree
        run: git diff --exit-code -- . ':!dist'
